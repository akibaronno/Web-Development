<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Fill Up</title>
</head>
<body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register.</p>
    <hr>

    <h2>Personal Details</h2>

    <form >
        <label for="firstname">First Name: </label>
        <input type="text" name="firstName" id="firstname" placeholder="e.g. Farhad" required>
        <br><br>
        <label for="lastname">Last Name:= </label>
        <input type="text" name="lastName" id="lastname" placeholder="e.g. Ali">
        <br><br>
        <label for="dateofbirth">Date of Birth:</label>
        <input type="date" name="dateofbirth" id="dateofbirth" required>
        <br><br>
        <label>Gender:</label>
        <br>
        
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>
        <br>
        
        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
        <br>

        <input type="radio" name="gender" id="others">
        <label for="other">Others</label>
        <br><br>
        
        <label>Upload Your Photo:</label>
        <br>
        <input type="file" name="file">
        <br><br>
        <hr>
       
       <h2>Contact Information</h2>
       <label for="email">Email Address: </label>
       <input type="text" name="email" id="email" placeholder="xyz@example.com" required>
       <br><br>
       <label for="phone number">Phone Number: </label>
       <input type="tel" name="phone number" id="phone number" placeholder="e.g.,+880-1xxxxxxxxx" required>
       <br><br>
       <label for="address">Mailing Adress: </label>
       <br>
       <textarea name="address" id="address" rows="5" cols="30" placeholder="Street Address, City, State, ZIP Code"></textarea>
       <br><br>
       <hr>

       <h2>Academic Information</h2>

       <label for="course">Select Your Course: </label>
       <br>
       <select name="course" id="course">
        <option value="">-- Choose a course --</option>
        <option value="CSE">CSE</option>
        <option value="ME">ME</option>
        <option value="IT">IT</option>
       </select>
        <br><br>
       <label>Extracurricular Interests: </label> <br>
       <input type="checkbox" name="sports" id="sports">
       <label for="sports">Sports</label><br>
       <input type="checkbox" name="music" id="music">
       <label for="music">Music & Arts</label><br>
       <input type="checkbox" name="tech" id="tech">
       <label for="tech">Technology Clubs</label><br>
       <input type="checkbox" name="vol" id="vol">
       <label for="vol">Volunteering</label><br><br>
       <hr>

       <h2>Create Your Account</h2>
       <label for="password">Create a Password: </label>
       <input type="password" name="password" id="password">
       <br><br>
        <label for="secu">Security Question: </label>
        <select name="secu" id="secu">
            <option value="">What was your first pet's name?</option>
            <option value="cat">Cat</option>
            <option value="dog">Dog</option>
            <option value="lion">Lion</option>
            <option value="whale">Whale</option>
            <option value="panda">Panda</option>
        </select> <br><br>
        <label for="sec">Security Answer: </label>
        <input type="text" name="sec" id="sec">
        <br><br>
        <input type="checkbox" name="termscondi" id="termscondi">
        <label for="termscondi"> I agree to the Terms and Conditions.</label><br>
        <hr>

        <button type="submit">Register</button>
        <button type="reset">Clear Form</button>
    
    <br><br><br><br><br><br>
    </form>



</body>
</html>
