<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Bungee&family=Karla:ital,wght@0,200..800;1,200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: gray;
            padding: 45px;
        }

        .card {
            background-color: white;
            width: 198px;
            height: 344px;
            border-radius: 7px;
        }

        .img {
            padding: 5px;
        }

        .content {
            padding: 7px 12px;
            font-family: "Open Sans", sans-serif;
        }

        .content p {
            font-size: 12px;
        }

        .capsules {
            padding: 0 20px;
            font-family: "Open Sans", sans-serif;

        }

        .capsules span {
            border: 1px solid gray;
            padding: 0px 6px;
            border-radius: 7px;
            font-size: 13px;

        }


        p {

            color: gray;
        }
        .button{
            text-align: center;
            padding: 10px;
        }
        .button button{
            padding: 9px 9px;
            border-radius: 15px;
            background-color: rgb(175, 215, 240);
            color: blue;
            font-size: 12px;
            border: none;
            margin-top: 7px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="img">
            <img style="border-radius: 7px;" width="188" src="./card.jpeg.webp" alt="card list-style-image">
        </div>
        <div class="capsules">
            <span style="margin-right: 5px;">Nature</span>
            <span>Lake</span>

        </div>
        <div class="content">
            <h2>Farhad</h2>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quisquam repellat, soluta molestias totam, quis
                odit quo, sequi est inventore corporis et. Facere, voluptate?</p>
        </div>

        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
