<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Bungee&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <style>
        * {
            padding: 0px;
            margin: 0px;
        }

        .parent {
            background-color: rgb(233, 240, 238);
            padding: 40px;
            position: relative;
            height: 1000px;

        }

        .box {
            
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            width: 500px;
            height: 800px;

        }

        .box img {
            height: 400px;
            width: 500px;
            display: block;
            border-radius: 20px;

        }

        .sp {
            /* margin-top:20px; */
            padding: 25px;
        }

        .cap {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid gray;
            margin-right: 20px;
            font-size: 20px;
            color: rgba(0, 0, 0, 0.566);
        }

        .fonti {
            font-family: "Open Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: <weight>;
            font-style: normal;
            font-variation-settings: "wdth" 100;
            
        }
        .lorem{
           
            margin-top: 20px;
            padding: 3px;
            font-size: 25px;
            color: rgba(0, 0, 0, 0.564);
        }
        .last{
            margin-top: 40px;
            position: relative;
            left: 180px;
            display: inline-block;
            background-color: rgba(170, 181, 234, 0.952);
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid whitesmoke;
            margin-right: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box">
            <img src="./card.jpeg.webp" alt="">
            <div class="sp sp1">
                <span class="cap"> Nature </span>
                <span class="cap"> Lake </span>
            </div>

            <h1 class="fonti" style="font-size: 45px;">Lago di Braies</h1>
            <div class="lorem">
                Lorem ipsum dolor Lorem, Lorem ipsum dolor sit. sit amet consectetur adipisicing elit. Et ullam consequuntur tempore, rerum sapiente similique quibusdam nostrum maxime hic enim!
            </div>
            <div class="last">
                Read More
            </div>

        </div>
    </div>
</body>

</html>
