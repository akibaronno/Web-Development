<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px solid red;
            padding: 34px;

            box-shadow: 4px 7px 11px #70f504;
        }
        .text-element{
            text-shadow: 2px 2px 4px rgb(251, 13, 219);
            outline: 2px solid red;
            border: 2px solid green;
            outline-offset: 10px;

        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <p class="text-element">Lorem ipsum dolor sit amet consectetur adipisicing elit. Officia cupiditate nam similique numquam excepturi expedita suscipit deserunt dolorem magni reiciendis.</p>
</body>
</html>
